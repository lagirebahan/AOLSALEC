<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LOGIN PAGE ─────────────────────────────────── -->
  <div id="login-page" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fa-solid fa-book-open"></i>
      </div>
      <h1 class="login-title">Library System</h1>
      <p class="login-sub">Sign in to access the catalog</p>

      <div id="login-error" class="login-error hidden"></div>

      <form id="login-form">
        <div class="field-group">
          <label>USERNAME</label>
          <input type="text" id="login-username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="field-group">
          <label>PASSWORD</label>
          <input type="password" id="login-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn-signin" id="signin-btn">
          <span id="signin-label">Sign In</span>
          <i class="fa-solid fa-spinner fa-spin hidden" id="signin-spinner"></i>
        </button>
      </form>

      <div class="login-switch">
        Don't have an account? <span id="go-register">Register</span>
      </div>
    </div>
  </div>

  <!-- ── REGISTER PAGE ──────────────────────────────── -->
  <div id="register-page" class="login-page hidden">
    <div class="login-card">
      <div class="login-logo">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <h1 class="login-title">Create Account</h1>
      <p class="login-sub">Register to join the library</p>

      <div id="register-error" class="login-error hidden"></div>
      <div id="register-success" class="login-success hidden"></div>

      <form id="register-form">
        <div class="field-group">
          <label>USERNAME</label>
          <input type="text" id="reg-username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="field-group">
          <label>EMAIL</label>
          <input type="email" id="reg-email" placeholder="Enter email">
        </div>
        <div class="field-group">
          <label>PASSWORD</label>
          <input type="password" id="reg-password" placeholder="Enter password">
        </div>
        <button type="submit" class="btn-signin" id="register-btn">
          <span id="register-label">Create Account</span>
          <i class="fa-solid fa-spinner fa-spin hidden" id="register-spinner"></i>
        </button>
      </form>

      <div class="login-switch">
        Already have an account? <span id="go-login">Sign in</span>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ────────────────────────────────────── -->
  <div id="app" class="app hidden">

    <!-- Top Nav -->
    <header class="topnav">
      <div class="nav-left">
        <i class="fa-solid fa-book-open nav-logo-icon"></i>
        <span class="nav-brand">Library System</span>
      </div>
      <nav class="nav-tabs">
        <button class="nav-tab active" data-view="catalog">
          <i class="fa-solid fa-books"></i> Catalog
        </button>
        <button class="nav-tab admin-only hidden" data-view="users">
          <i class="fa-solid fa-users"></i> Users
        </button>
      </nav>
      <div class="nav-right">
        <span class="role-badge" id="role-badge">USER</span>
        <span class="nav-username" id="nav-username">user</span>
        <button class="btn-logout" id="logout-btn">Logout</button>
      </div>
    </header>

    <!-- ── CATALOG VIEW ──────────────────────────────── -->
    <div id="view-catalog" class="view">

      <!-- Add book bar (admin only) -->
      <div class="add-book-bar admin-only hidden">
        <i class="fa-solid fa-plus"></i>
        <input type="text" id="add-title" placeholder="Book title...">
        <input type="text" id="add-author" placeholder="Author name...">
        <input type="number" id="add-copies" placeholder="Copies" min="1" value="1" style="width:90px">
        <button class="btn-add-book" id="add-book-btn">Add Book</button>
      </div>

      <!-- Search bar -->
      <div class="search-bar-row">
        <div class="search-input-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-title" placeholder="Search by title...">
        </div>
        <div class="search-input-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-author" placeholder="Search by author...">
        </div>
        <button class="btn-clear hidden" id="clear-search">✕ Clear</button>
      </div>

      <!-- Book grid -->
      <div id="book-grid" class="book-grid"></div>
    </div>

    <!-- ── USERS VIEW (admin only) ───────────────────── -->
    <div id="view-users" class="view hidden">
      <div class="add-user-bar">
        <input type="text" id="new-username" placeholder="Username">
        <input type="password" id="new-password" placeholder="Password">
        <select id="new-role">
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>
        <button class="btn-add-book" id="add-user-btn">Add User</button>
      </div>
      <table class="users-table">
        <thead>
          <tr>
            <th>#</th><th>USERNAME</th><th>ROLE</th><th>CREATED</th><th>ACTION</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- ── EDIT BOOK MODAL ──────────────────────────────── -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Edit Book</h3>
      <input type="hidden" id="edit-book-id">
      <div class="field-group">
        <label>TITLE</label>
        <input type="text" id="edit-title" placeholder="Book title">
      </div>
      <div class="field-group">
        <label>AUTHOR</label>
        <input type="text" id="edit-author" placeholder="Author">
      </div>
      <div class="field-group">
        <label>COPIES</label>
        <input type="number" id="edit-copies" min="1">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="edit-cancel">Cancel</button>
        <button class="btn-save" id="edit-save">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
